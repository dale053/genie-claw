# Daily fmt + clippy + test loop for issue #34.
# Runs on every push to main and every PR targeting main.
# Pairs with the audit.yml workflow that consumes the rustls-webpki
# 0.103.13 bump landed alongside this file (RUSTSEC-2026-0104).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Treat warnings as errors so clippy/rustc drift fails CI instead of rotting.
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

# Cancel in-flight runs when a newer commit lands on the same ref,
# so force-pushes during review don't queue up redundant builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Run the slow release-build tests (binary_size_budget, core_binary_builds)
      # here; they skip locally so `cargo test` stays fast for contributors.
      GENIE_RUN_RELEASE_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test
      - name: cargo build --workspace
        run: cargo build --workspace --locked --all-targets
      - name: cargo test --workspace
        run: cargo test --workspace --locked --all-targets
      - name: cargo test --doc
        run: cargo test --workspace --locked --doc
      # BFCL live-router accuracy gate (issue #579). The committed
      # golden-file smoke test (`loads_jsonl_fixture_and_scores_report`)
      # is fixed at 100% and only exercises the scorer's parsing, so the
      # *live* quick-router could silently regress with CI green. Regenerate
      # predictions from the live `route_for_available_tools` path and gate
      # on the real score.
      #
      # Floor is 96% (live is 25/26). The single holdout is the two-call
      # `multi-homework-timer` case (#533), which the deterministic router
      # emits as one call. Raise this floor toward 100% as #533 lands.
      - name: BFCL live quick-router accuracy gate
        run: |
          cargo run --locked -p genie-ctl -- \
            bfcl-predict-quick \
            --cases tests/bfcl/home_tool_cases.jsonl \
            --out target/bfcl-live-predictions.jsonl
          cargo run --locked -p genie-ctl -- \
            bfcl-score \
            --cases tests/bfcl/home_tool_cases.jsonl \
            --predictions target/bfcl-live-predictions.jsonl \
            --min-strict 96

  # Chat-only build axis (issue #59 / closes acceptance criterion #8 from
  # #41 + #57). Guards `cargo {clippy,test} --no-default-features` on
  # genie-core + genie-ctl so the voice-gated cfgs (and the latent
  # telegram-gated cleanups from #57) don't silently bit-rot on the
  # macOS / Windows / chat-bot deployment path. Scoped to the two crates
  # that declare a `voice` feature; running --workspace would just
  # duplicate the existing --workspace job. Distinct rust-cache shared-key
  # because the feature-set produces a different target/ graph than the
  # default --workspace axis.
  no-default-features:
    name: cargo clippy + test (--no-default-features)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-nodefault
      - name: cargo clippy --no-default-features
        run: |
          cargo clippy \
            -p genie-core -p genie-ctl \
            --no-default-features --all-targets --locked \
            -- -D warnings
      - name: cargo test --no-default-features
        run: |
          cargo test \
            -p genie-core -p genie-ctl \
            --no-default-features --all-targets --locked
