# Auto-label issues and PRs by type and authorship.
#
# Type label — at most one, priority optimization > performance > bug:
#   * optimization — title starts with `perf` AND the PR body has a ticked
#     "I have verified the change end-to-end on Jetson hardware." box.
#   * performance  — title starts with `perf` without that box ticked.
#   * bug          — title starts with `fix` or contains `[bug]`.
# Author label — `maintainer` only, by GitHub role (author_association):
#   * maintainer — OWNER / MEMBER / COLLABORATOR. Everyone else gets no author label.
# Reward labels (drive the Gittensor scoring multipliers):
#   * verify-jetson    — PR only; the "verified ... on Jetson hardware" box is ticked.
#   * maintainer-issue — a maintainer-opened issue, and any PR that closes such an
#     issue (via a `closes/fixes/resolves #N` reference).
#
# Ownership / reconciliation:
#   * {optimization, performance} is fully owned here: the workflow keeps exactly
#     the computed label and removes its sibling, so edits re-label (ticking the
#     Jetson box flips performance -> optimization; an empty box flips it back).
#   * `maintainer` is set for maintainer authors and removed otherwise; the
#     retired `community-contribution` label is always removed.
#   * `bug` is ADD-only — the issue forms ([bug]/[audio]/[voice]) and manual
#     curation also apply it, so the workflow never removes it.
#   * `verify-jetson` is owned on PRs: added when the Jetson box is ticked, removed
#     when it is not (so re-review edits flip it).
#   * `maintainer-issue` is ADD-only — set on maintainer-opened issues and inherited
#     by PRs that close them; manual curation also applies it, so it is never removed.
#   * Every other label (enhancement, audio, voice, jetson, M1, ...) is untouched.
#
# Like contribution.yml / pr-limit.yml this uses `pull_request_target` and never
# checks out or runs PR code — it only reads PR/issue metadata from the event
# payload and calls the labels API, so the write permissions are safe.

name: Auto Label

on:
  issues:
    types: [opened, edited, reopened]
  pull_request_target:
    types: [opened, edited, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-label:
    name: Apply type + author labels
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Classify and apply labels
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          TITLE: ${{ github.event.issue.title || github.event.pull_request.title }}
          BODY: ${{ github.event.issue.body || github.event.pull_request.body }}
          ASSOC: ${{ github.event.issue.author_association || github.event.pull_request.author_association }}
          EVENT: ${{ github.event_name }}
        run: |
          set -uo pipefail

          title_lc="$(printf '%s' "$TITLE" | tr '[:upper:]' '[:lower:]')"

          # Type detection from the conventional-commit-style title prefix.
          is_perf=0; is_fix=0; is_bug=0
          case "$title_lc" in perf:*|"perf("*|perf!*|"perf "*) is_perf=1 ;; esac
          case "$title_lc" in fix:*|"fix("*|fix!*|"fix "*) is_fix=1 ;; esac
          [ "$is_fix" = 1 ] && is_bug=1
          printf '%s' "$TITLE" | grep -qiE '\[bug\]' && is_bug=1

          # Jetson-verified = the PR template's specific box is ticked. The
          # "I have NOT verified ..." box uses different wording and never matches.
          jetson=0
          if printf '%s' "$BODY" | grep -qiE '^[[:space:]]*-[[:space:]]*\[[xX]\][[:space:]]*I have verified the change end-to-end on Jetson hardware'; then
            jetson=1
          fi

          type_label=""
          if [ "$is_perf" = 1 ] && [ "$jetson" = 1 ]; then type_label="optimization"
          elif [ "$is_perf" = 1 ]; then type_label="performance"
          elif [ "$is_bug" = 1 ]; then type_label="bug"
          fi

          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) author_label="maintainer" ;;
            *) author_label="" ;;
          esac

          echo "::notice::#${NUMBER} assoc=${ASSOC} type=${type_label:-none} author=${author_label:-none}"

          # Self-bootstrap the two labels this repo doesn't ship yet (no-op if present).
          gh label create performance --repo "$REPO" --color FEF2C0 \
            --description "Performance work (not verified on Jetson hardware)" 2>/dev/null || true
          gh label create maintainer --repo "$REPO" --color 6F42C1 \
            --description "Authored by a project maintainer" 2>/dev/null || true
          gh label create verify-jetson --repo "$REPO" --color 1D76DB \
            --description "Verified end-to-end on Jetson hardware" 2>/dev/null || true
          gh label create maintainer-issue --repo "$REPO" --color 5319E7 \
            --description "Resolves a maintainer-filed issue" 2>/dev/null || true

          add()    { gh api -X POST "repos/$REPO/issues/$NUMBER/labels" -f "labels[]=$1" >/dev/null 2>&1 || true; }
          remove() { gh api -X DELETE "repos/$REPO/issues/$NUMBER/labels/$1" >/dev/null 2>&1 || true; }

          # Author label — `maintainer` only. The retired `community-contribution`
          # label is never added and is removed wherever a prior run set it.
          if [ "$author_label" = "maintainer" ]; then
            add maintainer
          else
            remove maintainer
          fi
          remove community-contribution

          # Perf type — workflow fully owns {optimization, performance}.
          case "$type_label" in
            optimization) add optimization; remove performance ;;
            performance)  add performance; remove optimization ;;
            *)            remove optimization; remove performance ;;
          esac

          # bug — add-only (issue forms and manual curation also set it).
          [ "$type_label" = "bug" ] && add bug || true

          # verify-jetson — owned here for PRs: ticking the "verified ... on Jetson
          # hardware" box adds it, unticking removes it. (Issues have no such box.)
          if [ "$EVENT" = "pull_request_target" ]; then
            if [ "$jetson" = 1 ]; then add verify-jetson; else remove verify-jetson; fi
          fi

          # maintainer-issue — add-only. A maintainer-opened issue is marked as
          # maintainer-filed; a PR that closes an issue carrying the label inherits
          # it (so the PR earns the reward multiplier). Manual curation also applies
          # it, so it is never removed here.
          if [ "$EVENT" = "issues" ]; then
            [ "$author_label" = "maintainer" ] && add maintainer-issue || true
          elif [ "$EVENT" = "pull_request_target" ]; then
            # `|| true`: GitHub runs this step under `bash -e`, so the grep
            # returning 1 on a PR body with no issue reference would abort the
            # whole step (regression from #626). Tolerate no-match like the
            # other guarded commands here.
            refs="$(printf '%s' "$BODY" | grep -oiE '(clos|fix|resolv)[a-z]*[[:space:]]+#[0-9]+' | grep -oE '[0-9]+' | sort -u || true)"
            for iss in $refs; do
              if gh api "repos/$REPO/issues/$iss/labels" --jq '.[].name' 2>/dev/null | grep -qx "maintainer-issue"; then
                add maintainer-issue
                break
              fi
            done
          fi
